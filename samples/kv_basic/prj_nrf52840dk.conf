# nrf52840dk board-specific configuration
# This configuration enables real FLASH-backed NVS storage for functional testing
# 
# Usage: west build -b nrf52840dk samples/kv_basic -- -DOVERLAY_CONFIG=prj_nrf52840dk.conf
#
# Note: The nrf52840dk provides real FLASH storage, allowing NVS backend to
# persist data and exercise actual storage behavior (wear-leveling, compaction, etc.)

CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_HEAP_MEM_POOL_SIZE=4096

CONFIG_ZEPHYRDB=y
CONFIG_ZDB_KV=y
CONFIG_ZDB_TS=n
CONFIG_ZDB_STATS=y

# NVS is the default KV backend on hardware with FLASH
CONFIG_ZDB_KV_BACKEND_NVS=y

# Required for NVS functionality on nrf52840dk
# Uncomment when building for hardware; not available on native_sim
# CONFIG_NVS=y
# CONFIG_FLASH=y
