# nrf52840dk board-specific configuration
# This configuration enables real FLASH-backed LittleFS storage for functional testing
#
# Usage: west build -b nrf52840dk samples/ts_basic -- -DOVERLAY_CONFIG=prj_nrf52840dk.conf

CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_HEAP_MEM_POOL_SIZE=4096

CONFIG_ZEPHYRDB=y
CONFIG_ZDB_KV=n
CONFIG_ZDB_TS=y
CONFIG_ZDB_STATS=y

CONFIG_CRC=y

# Required for LittleFS functionality on nrf52840dk
# Uncomment when building for hardware; not available on native_sim
# CONFIG_FILE_SYSTEM=y
# CONFIG_FILE_SYSTEM_LITTLEFS=y
# CONFIG_FLASH=y
