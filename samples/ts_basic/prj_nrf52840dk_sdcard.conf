# nrf52840dk SD-card overlay (LittleFS BLK mode)
#
# Usage:
#   west build -b nrf52840dk/nrf52840 samples/ts_basic \
#     -- -DOVERLAY_CONFIG=prj_nrf52840dk_sdcard.conf
#
# This overlay targets SD-card backed LittleFS (BLK mode).
# A board DTS overlay is still required to bind the SD-card disk device.

CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_HEAP_MEM_POOL_SIZE=4096

CONFIG_ZEPHYRDB=y
CONFIG_ZDB_KV=n
CONFIG_ZDB_TS=y
CONFIG_ZDB_TS_BACKEND_LITTLEFS=y
CONFIG_ZDB_STATS=y

CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FS_LITTLEFS_BLK_DEV=y

# Select one SD disk driver path supported by your board wiring.
# Keep SDMMC disabled by default for nrf52840dk unless your HW exposes SDMMC.
CONFIG_DISK_DRIVER_SDMMC=n
# CONFIG_DISK_DRIVER_MMC=y

CONFIG_CRC=y
